name: bump cask versions

on:
  schedule:
    # Run every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  bump:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Bump outdated casks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew livecheck --tap "$GITHUB_REPOSITORY" --newer-only --quiet | while read -r cask version; do
            brew bump-cask-pr \
              --no-browse \
              --no-audit \
              --version "$version" \
              "$cask" || true
          done
